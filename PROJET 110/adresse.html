<!DOCTYPE html>
<html>
<head>
    <title>Emplacement</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-adresse.css">
</head>

<body>

<a href="accueil.html" class="btn-accueil">
    <button>Accueil</button>
</a>

<div class="btn-retour" id="btnRetour" style="display:none;">
    <button onclick="retourEtape1()">Retour</button>
</div>

<h1>Emplacement</h1>

<h2 id="titreEtape">Choix du mouvement</h2>

<div class="zone-principale">

    <!-- ===============================
         ÉTAPE 1 : CHOIX TYPE
    =============================== -->
    <div id="blocChoix">

        <div class="ligne-validation">

            <button onclick="choisirType('RECEPTION - RESERVE')">
                Réception - Réserve
            </button>

            <button onclick="choisirType('RESERVE - RESERVE')">
                Réserve - Réserve
            </button>

        </div>

    </div>

    <!-- ===============================
         ÉTAPE 2 : NUMÉRO INTERNE
    =============================== -->
    <div id="blocPalette" style="display:none;">

        <h3 id="texteChoix"></h3>

        <div class="ligne-validation">

            <input 
                type="text"
                id="palette"
                placeholder="Numéro interne"
                maxlength="3"
                inputmode="numeric"
                oninput="verifPalette(this); verifierPalette();"
            >

            <button id="btnCheck" disabled>❌</button>

        </div>

        <div class="ligne-validation" style="margin-top:15px;">

            <button id="btnFichier" onclick="creerFichier()" disabled>
                Créer fichier
            </button>

        </div>

    </div>

</div>

<script>

// ===============================
// VARIABLES
// ===============================
let typeChoisi = "";


// ===============================
// ÉTAPE 1 : CHOIX TYPE
// ===============================
function choisirType(type) {

    typeChoisi = type;

    document.getElementById("titreEtape").innerText =
        "Création fichier";

    document.getElementById("texteChoix").innerText =
        type;

    document.getElementById("blocChoix").style.display =
        "none";

    document.getElementById("blocPalette").style.display =
        "block";
        
    document.getElementById("btnRetour").style.display =
        "block";

    document.getElementById("palette").focus();
}


// ===============================
// RETOUR ÉTAPE 1
// ===============================
function retourEtape1() {

    // Cache étape 2
    document.getElementById("blocPalette").style.display =
        "none";

    // Réaffiche étape 1
    document.getElementById("blocChoix").style.display =
        "block";

    // Cache bouton retour
    document.getElementById("btnRetour").style.display =
        "none";

    // Remet titre initial
    document.getElementById("titreEtape").innerText =
        "Choix du mouvement";

    // Réinitialise choix
    typeChoisi = "";

    // Reset champ palette
    document.getElementById("palette").value = "";

    // Reset bouton check
    document.getElementById("btnCheck").textContent =
        "❌";

    // Reset bouton création
    document.getElementById("btnFichier").disabled =
        true;

    // Reset texte
    document.getElementById("texteChoix").innerText =
        "";
}


// ===============================
// CONTRÔLE INPUT NUMÉRO INTERNE
// ===============================
function verifPalette(champ) {

    champ.value =
        champ.value.replace(/[^0-9]/g, '');

    if (champ.value.length > 3) {

        champ.value =
            champ.value.slice(0, 3);
    }
}


// ===============================
// CHECK VISUEL
// ===============================
function verifierPalette() {

    let champPalette =
        document.getElementById("palette");

    let valeur =
        champPalette.value;

    let boutonCheck =
        document.getElementById("btnCheck");

    let btnFichier =
        document.getElementById("btnFichier");

    let estValide =
        /^\d{3}$/.test(valeur);

    if (estValide) {

        boutonCheck.textContent = "✅";

        btnFichier.disabled = false;

    } else {

        boutonCheck.textContent = "❌";

        btnFichier.disabled = true;
    }
}


// ===============================
// CRÉATION DU FICHIER
// ===============================
function creerFichier() {

    let palette =
        document.getElementById("palette").value;

    if (!/^\d{3}$/.test(palette)) {

        alert("Numéro interne invalide");

        return;
    }

    let today = new Date();

    let jour =
        String(today.getDate()).padStart(2, '0');

    let mois =
        String(today.getMonth() + 1).padStart(2, '0');

    let annee =
        today.getFullYear();

    let date =
        jour + "/" + mois + "/" + annee;

    window.location.href =
        "adresse-scan.html?palette=" + palette +
        "&commentaire=" + encodeURIComponent(typeChoisi) +
        "&date=" + date;
}

</script>

</body>
</html>
