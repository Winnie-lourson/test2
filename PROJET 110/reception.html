<!DOCTYPE html>
<html>
<head>
    <title>Réception</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-reception.css">
</head>

<body>

<a href="accueil.html" class="btn-accueil">
    <button>Accueil</button>
</a>

<div class="btn-retour" id="btnRetour" style="display:none;">
    <button onclick="retourEtape1()">Retour</button>
</div>

<h1>Réception</h1>

<h2 id="titreFichier">Création fichier</h2>


<div class="zone-principale" id="zonePrincipale">

    <h3 id="texteCommentaire" style="display:none;"></h3>
    
    <!-- ÉTAPE 1 -->
    <div id="blocCommentaire">

        <div class="ligne-validation">
            <input 
                type="text"
                id="commentaire"
                placeholder="Nom de la réception"
            >

            <button onclick="validerCommentaire()">Suivant</button>
        </div>

    </div>

    <!-- ÉTAPE 2 -->
    <div id="blocPalette" style="display:none; margin-top:20px;">

        <div class="ligne-validation">
            <input 
                type="text"
                id="palette"
                placeholder="Numéro interne"
                maxlength="3"
                inputmode="numeric"
                oninput="verifPalette(this); verifierPalette();"
            >

            <button id="btnCheck" disabled>❌</button>
        </div>

        <!-- Bouton réel -->
        <div class="ligne-validation" style="margin-top:15px;">
            <button id="btnfichier" onclick="creerFichier()">Créer fichier</button>
        </div>

    </div>

</div>

<script>

// ===============================
// ÉTAPE 1 : VALIDATION COMMENTAIRE
// ===============================
document.getElementById("commentaire").focus();

function validerCommentaire() {

    let commentaire = document.getElementById("commentaire").value.trim();

    // Vérifie si vide
    if (commentaire === "") {
        alert("Veuillez renseigner un commentaire");
        return;
    }

    // Modifier le sous-titre avec commentaire
    document.getElementById("texteCommentaire").innerText = commentaire;

    document.getElementById("texteCommentaire").style.display = "block";

    // Faire disparaître complètement le bloc commentaire
    document.getElementById("blocCommentaire").style.display = "none";

    // Faire apparaître le bloc numéro interne
    document.getElementById("blocPalette").style.display = "block";

    // Faire apparaître bouton retour
    document.getElementById("btnRetour").style.display = "block";

    document.getElementById("palette").focus();
}


// ===============================
// RETOUR ÉTAPE 1
// ===============================
function retourEtape1() {

    // Cache étape 2
    document.getElementById("blocPalette").style.display =
        "none";

    // Réaffiche étape 1
    document.getElementById("blocCommentaire").style.display =
        "block";

    // Cache bouton retour
    document.getElementById("btnRetour").style.display =
        "none";

    // Réinitialise titre
    document.getElementById("titreFichier").innerText =
        "Création fichier";

    // Reset commentaire affiché
    document.getElementById("texteCommentaire").innerText =
        "";

    document.getElementById("texteCommentaire").style.display =
        "none";

    // Reset palette
    document.getElementById("palette").value =
        "";

    // Reset bouton check
    document.getElementById("btnCheck").textContent =
        "❌";

    document.getElementById("btnCheck").classList.remove("valide");

    document.getElementById("btnCheck").classList.add("invalide");

    // Focus commentaire
    document.getElementById("commentaire").focus();
}


// ===============================
// CONTRÔLE INPUT NUMÉRO INTERNE
// ===============================
function verifPalette(champ) {

    // Supprime tout sauf chiffres
    champ.value = champ.value.replace(/[^0-9]/g, '');

    // Max 3 caractères
    if (champ.value.length > 3) {
        champ.value = champ.value.slice(0, 3);
    }
}


// ===============================
// CHECK VISUEL ❌ / ✅
// ===============================
function verifierPalette() {

    let champPalette = document.getElementById("palette");
    let valeur = champPalette.value;

    let bouton = document.getElementById("btnCheck");

    // Vérifie exactement 3 chiffres
    let estValide = /^\d{3}$/.test(valeur);

    if (estValide) {
        bouton.textContent = "✅";
        bouton.classList.remove("invalide");
        bouton.classList.add("valide");
    } else {
        bouton.textContent = "❌";
        bouton.classList.remove("valide");
        bouton.classList.add("invalide");
    }
}


// ===============================
// CRÉATION DU FICHIER + OUVERTURE
// ===============================
function creerFichier() {

    // Récupération numéro interne
    let palette = document.getElementById("palette").value;

    // Récupération commentaire
    let commentaire = document.getElementById("texteCommentaire")
    .innerText.replace("Commentaire : ", "");

    // Vérification stricte
    if (!/^\d{3}$/.test(palette)) {
        alert("Numéro interne invalide");
        return;
    }

    // Date automatique
    let today = new Date();

    let jour = String(today.getDate()).padStart(2, '0');
    let mois = String(today.getMonth() + 1).padStart(2, '0');
    let annee = today.getFullYear();

    let date = jour + "/" + mois + "/" + annee;

    // Redirection vers scan.html
    window.location.href =
        "reception-scan.html?palette=" + palette +
        "&commentaire=" + encodeURIComponent(commentaire) +
        "&date=" + date;
}

</script>

</body>
</html>
