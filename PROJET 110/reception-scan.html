<!DOCTYPE html>
<html>
<head>
    <title>Réception scan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Style-scan.css">
</head>

<body>

<a href="accueil.html" class="btn-accueil">
    <button>Accueil</button>
</a>

<a href="reception.html" class="btn-retour">
    <button>Retour</button>
</a>

<h1>Réception</h1>

<h2>Scan palette</h2>

<div class="zone-scan">

    <h3 id="infos"></h3>

    <!-- ===============================
         ÉTAPE 1 : SUPPORT
    =============================== -->
    <div id="blocSupport">

        <div class="ligne-validation">

            <input 
                type="text" 
                id="support" 
                placeholder="Numéro de support"
                maxlength="18"
                inputmode="numeric"
                oninput="verifierSupport()"
            >

            <button id="btnSupport" onclick="validerSupport()" disabled>
                Valider
            </button>

        </div>

        <div id="affichageSupport"></div>

        <p id="erreurSupport"></p>

    </div>

    <!-- ===============================
         ÉTAPE 2 : BT + TABLEAU
    =============================== -->
    <div id="blocBT" style="display:none;">

        <div class="ligne-validation">

        <input 
            type="text" 
            id="bt" 
            placeholder="Numéro de BT"
            maxlength="18"
            inputmode="numeric"
            oninput="verifierBT()"
        >

        <button id="btnBT" onclick="ajouterBT()" disabled>
            Valider
        </button>

    </div>

</div>

<div id="affichageBT"></div>

<p id="erreurBT"></p>

        <p>Total scans : <span id="compteur">0</span></p>

        <table id="tableHistorique">
            <thead>
                <tr>
                    <th>Numéro support</th>
                    <th>Numéro BT</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="historiqueBody">
            </tbody>

        </table>

        <button id="btnFinScan" onclick="finDeScan()">
            Fin de scan
        </button>

    </div>

</div>

<script>

// ===============================
// RÉCUPÉRATION DES INFOS PAGE RECEPTION
// ===============================
let params = new URLSearchParams(window.location.search);
let palette = params.get("palette");
let commentaire = params.get("commentaire");

document.getElementById("infos").innerText =
palette + " - " + commentaire;


// ===============================
// GESTION AUDIO
// ===============================
let validationLancee = false;
let timerValidation = null;
let dernierSonErreur = 0;
let validationBTLancee = false;
let timerBTValidation = null;


// ===============================
// VALIDATION SUPPORT
// ===============================
document.getElementById("support").focus();

function validerSupport() {

    let support = document.getElementById("support").value.trim();

    if (support === "") {
        alert("Veuillez renseigner le numéro de support");
        return;
    }

    document.getElementById("infos").innerText =
        palette + " - " + commentaire + " / Support : " + support;

    document.getElementById("blocSupport").style.display = "none";

    document.getElementById("blocBT").style.display = "block";

    document.getElementById("bt").focus();
}


// ===============================
// SON VALIDATION
// ===============================
function jouerSonValidation() {

    let audio = new Audio("sons/validation.mp3");

    audio.volume = 1.0;

    audio.play();
}


// ===============================
// SON ERREUR
// ===============================
function jouerSonErreur() {

    let maintenant = Date.now();

    // Limite légère anti-spam
    if (maintenant - dernierSonErreur < 1000) {
        return;
    }

    dernierSonErreur = maintenant;

    let audio = new Audio("sons/erreur.mp3");

    audio.volume = 1.0;

    audio.play();
}


// ===============================
// VÉRIFICATION NUMÉRO SUPPORT
// ===============================
function verifierSupport() {

    let champ = document.getElementById("support");
    let bouton = document.getElementById("btnSupport");
    let message = document.getElementById("erreurSupport");
    let affichage = document.getElementById("affichageSupport");

    champ.value =
        champ.value.replace(/[^0-9]/g, '');

    let support = champ.value;

    // Annule validation si modification
    clearTimeout(timerValidation);

    validationLancee = false;

    let prefixe = "0399999010910";

    let numeroInterne = parseInt(palette);

    let clefAttendue = 19070 + numeroInterne;

    message.innerText = "";
    message.style.color = "red";

    affichage.innerHTML = "";

    // ===============================
    // LONGUEUR
    // ===============================
    if (support.length < 18) {

        bouton.disabled = true;

        message.innerText =
            "❌ 18 chiffres requis";

        jouerSonErreur();

        return;
    }

    // ===============================
    // PREFIXE
    // ===============================
    let prefixInput = support.slice(0, 13);

    if (prefixInput !== prefixe) {

        bouton.disabled = true;

        let prefixeAffiche = "";

        for (let i = 0; i < prefixe.length; i++) {

            let chiffreTape =
                prefixInput[i] || "_";

            if (chiffreTape === prefixe[i]) {

                prefixeAffiche +=
                    "<span class='partie-ok'>" +
                    chiffreTape +
                    "</span>";

            } else {

                prefixeAffiche +=
                    "<span class='partie-erreur'>" +
                    chiffreTape +
                    "</span>";
            }
        }

        let finSupport = support.slice(13);

        affichage.innerHTML =
            prefixeAffiche +
            "<span>" + finSupport + "</span>";

        message.innerText =
            "❌ Préfixe incorrect | Attendu : " +
            prefixe;

        jouerSonErreur();

        return;
    }

    // ===============================
    // CLÉ
    // ===============================
    let finInput = support.slice(13);

    let cinqDerniers = parseInt(finInput);

    if ((cinqDerniers - numeroInterne) !== 19070) {

        bouton.disabled = true;

        affichage.innerHTML =
            "<span class='partie-ok'>" +
            prefixInput +
            "</span>" +
            "<span class='partie-erreur'>" +
            finInput +
            "</span>";

        message.innerText =
            "❌ Clé incorrecte | Attendu : " +
            clefAttendue;

        jouerSonErreur();

        return;
    }

    // ===============================
    // OK
    // ===============================
    affichage.innerHTML =
        "<span class='partie-ok'>" +
        support +
        "</span>";

    message.innerText =
        "✅ Numéro valide";

    message.style.color = "green";

    bouton.disabled = false;

    if (!validationLancee) {

        validationLancee = true;

        jouerSonValidation();

        timerValidation = setTimeout(() => {

            if (document.getElementById("btnSupport").disabled === false) {

                validerSupport();
            }

        }, 1500);
    }
}


// ===============================
// VÉRIFICATION NUMÉRO BT
// ===============================
function verifierBT() {

    let champ = document.getElementById("bt");
    let bouton = document.getElementById("btnBT");
    let message = document.getElementById("erreurBT");
    let affichage = document.getElementById("affichageBT");

    // Chiffres uniquement
    champ.value = champ.value.replace(/[^0-9]/g, '');

    let bt = champ.value;

    clearTimeout(timerBTValidation);

    validationBTLancee = false;

    message.innerText = "";
    message.style.color = "red";

    affichage.innerHTML = "";

    // ===============================
    // LONGUEUR
    // ===============================
    if (bt.length !== 15 && bt.length !== 18) {

        bouton.disabled = true;

        message.innerText =
            "❌ BT doit contenir exactement 15 ou 18 chiffres";

        if (bt.length > 0) {
            jouerSonErreur();
        }

        return;
    }

    // ===============================
    // FORMAT 15 CHIFFRES
    // ===============================
    if (bt.length === 15) {

        let prefixe15 = "100";

        if (!bt.startsWith(prefixe15)) {

            bouton.disabled = true;

            let affichagePrefixe = "";

            for (let i = 0; i < 3; i++) {

                let chiffreTape = bt[i] || "_";

                if (chiffreTape === prefixe15[i]) {

                    affichagePrefixe +=
                        "<span class='partie-ok'>" +
                        chiffreTape +
                        "</span>";

                } else {

                    affichagePrefixe +=
                        "<span class='partie-erreur'>" +
                        chiffreTape +
                        "</span>";
                }
            }

            affichage.innerHTML =
                affichagePrefixe +
                "<span>" + bt.slice(3) + "</span>";

            message.innerText =
                "❌ Un BT de 15 chiffres doit commencer par 100";

            jouerSonErreur();

            return;
        }
    }

    // ===============================
    // FORMAT 18 CHIFFRES
    // ===============================
    if (bt.length === 18) {

        let prefixe18 = "25003100";

        if (!bt.startsWith(prefixe18)) {

            bouton.disabled = true;

            let affichagePrefixe = "";

            for (let i = 0; i < 8; i++) {

                let chiffreTape = bt[i] || "_";

                if (chiffreTape === prefixe18[i]) {

                    affichagePrefixe +=
                        "<span class='partie-ok'>" +
                        chiffreTape +
                        "</span>";

                } else {

                    affichagePrefixe +=
                        "<span class='partie-erreur'>" +
                        chiffreTape +
                        "</span>";
                }
            }

            affichage.innerHTML =
                affichagePrefixe +
                "<span>" + bt.slice(8) + "</span>";

            message.innerText =
                "❌ Un BT de 18 chiffres doit commencer par 25003100";

            jouerSonErreur();

            return;
        }
    }

    // ===============================
    // VÉRIFICATION DOUBLON
    // ===============================
    let lignesExistantes = document.querySelectorAll("#historiqueBody tr");

    for (let ligne of lignesExistantes) {

        let existingBT = ligne.cells[1].textContent;

        if (existingBT === bt) {

            bouton.disabled = true;

            affichage.innerHTML =
                "<span class='partie-erreur'>" +
                bt +
                "</span>";

            message.innerText =
                "❌ BT déjà scanné";

            jouerSonErreur();

            document.getElementById("bt").focus();
            document.getElementById("bt").select();

            return;
        }
    }

    // ===============================
    // OK
    // ===============================
    affichage.innerHTML =
        "<span class='partie-ok'>" +
        bt +
        "</span>";

    message.innerText =
        "✅ Numéro BT valide";

    message.style.color = "green";

    bouton.disabled = false;

    if (!validationBTLancee) {

        validationBTLancee = true;

        jouerSonValidation();

        timerBTValidation = setTimeout(() => {

            if (document.getElementById("btnBT").disabled === false) {

                ajouterBT();
            }

        }, 1000);
    }
}


// ===============================
// AJOUTER UN NUMÉRO BT
// ===============================
function ajouterBT() {

    let support = document.getElementById("support").value.trim();
    let btInput = document.getElementById("bt");
    let bt = btInput.value.trim();

    if (bt === "") {
        alert("Veuillez remplir le numéro de BT");
        return;
    }

    if (document.getElementById("btnBT").disabled) {
        return;
    }

    let lignesExistantes2 = document.querySelectorAll("#historiqueBody tr");

    for (let ligne of lignesExistantes2) {

        let existingBT = ligne.cells[1].textContent;

        if (existingBT === bt) {

            document.getElementById("erreurBT").innerText =
                "❌ BT déjà scanné";

             document.getElementById("erreurBT").style.color = "red";

            document.getElementById("affichageBT").innerHTML =
                "<span class='partie-erreur'>" +
                bt +
                "</span>";

            jouerSonErreur();

            return;
        }
    }

    let tableBody = document.getElementById("historiqueBody");

    let ligne = document.createElement("tr");

    let doublon = false;

    let lignesExistantes = document.querySelectorAll("#historiqueBody tr");

    lignesExistantes.forEach(existingRow => {

        let existingBT = existingRow.cells[1].textContent;

        if (existingBT === bt) {
            doublon = true;
        }
    });

    if (doublon) {
        ligne.classList.add("doublon");
    }

    let celluleSupport = document.createElement("td");
    celluleSupport.textContent = support;

    let celluleBT = document.createElement("td");
    celluleBT.textContent = bt;

    let celluleDate = document.createElement("td");

    let today = new Date();

    let jour = String(today.getDate()).padStart(2, '0');
    let mois = String(today.getMonth() + 1).padStart(2, '0');
    let annee = today.getFullYear();

    celluleDate.textContent =
        jour + "/" + mois + "/" + annee;

    let celluleAction = document.createElement("td");

    let btnSupprimer = document.createElement("button");

    btnSupprimer.textContent = "❌";

    btnSupprimer.classList.add("btn-supprimer");

    btnSupprimer.onclick = function () {
        ligne.remove();
        mettreAJourCompteur();
        document.getElementById("bt").focus();
    };

    celluleAction.appendChild(btnSupprimer);

    ligne.appendChild(celluleSupport);
    ligne.appendChild(celluleBT);
    ligne.appendChild(celluleDate);
    ligne.appendChild(celluleAction);

    tableBody.appendChild(ligne);

    document.getElementById("compteur").textContent =
        tableBody.rows.length;

    btInput.value = "";

    document.getElementById("btnBT").disabled = true;

    document.getElementById("erreurBT").innerText = "";

    document.getElementById("affichageBT").innerHTML = "";

    validationBTLancee = false;

    document.getElementById("bt").focus();

}


// ===============================
// MISE À JOUR COMPTEUR
// ===============================
function mettreAJourCompteur() {

    let total =
        document.getElementById("historiqueBody").rows.length;

    document.getElementById("compteur").textContent = total;
}


// ===============================
// FIN DE SCAN + SAUVEGARDE
// ===============================
function finDeScan() {

    // Confirmation de fin
    let confirmation1 = confirm("Voulez-vous vraiment terminer ce scan ?");

    if (!confirmation1) {
        return;
    }

    let lignes = document.querySelectorAll("#historiqueBody tr");

    if (lignes.length === 0) {
        alert("Aucun scan à enregistrer");
        return;
    }

    // Nom du fichier
    let nomFichier = palette + " - " + commentaire;

    let donneesScan = [];

    lignes.forEach(ligne => {

        let support = ligne.cells[0].textContent;
        let bt = ligne.cells[1].textContent;
        let date = ligne.cells[2].textContent;

        donneesScan.push({
            support: support,
            bt: bt,
            date: date
        });
    });

    // Récupération bibliothèque existante
    let bibliotheque = JSON.parse(localStorage.getItem("fichiersScans")) || [];

    // Ajout nouveau fichier
    bibliotheque.push({
        nom: nomFichier,
        type: "reception",
        dateCreation: new Date().toLocaleDateString(),
        totalScans: donneesScan.length,
        contenu: donneesScan
    });

    // Sauvegarde
    localStorage.setItem("fichiersScans", JSON.stringify(bibliotheque));

    alert("✅ Fichier enregistré avec succès");

    // Redirection bibliothèque
    window.location.href = "fichier.html";
}

</script>

</body>
</html>
